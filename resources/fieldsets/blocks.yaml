title: Blocks
fields:
  -
    handle: blocks
    field:
      type: replicator
      localizable: true
      collapse: true
      listable: false
      display: Blocks
      instructions: 'Build your page by using various predefined content models.'
      button_label: 'Add Block'
      sets:
        main:
          display: Main
          sets:
            product_cards:
              display: Product Cards
              instructions: Place a Commerce7 products collection.
              icon: dashboard-layout
              fields:
                - handle: c7_collection_slug
                  field:
                    type: slug
                    display: Collection Slug
                    instructions: Enter the Commerce7 collection slug (Store → Collections → Desired Collection → SEO → Slug).
                    validate:
                      - required

                - handle: audience
                  field:
                    type: select
                    display: Visibility
                    instructions: Choose who can see this block.
                    options:
                      all: All visitors
                      members: Logged-in members only
                    clearable: false
                    multiple: false
                    searchable: false
                    default: all
                    validate:
                      - required

                - handle: guest_message
                  field:
                    type: textarea
                    display: Guest Message
                    instructions: Message shown to visitors who aren’t logged in.
                    placeholder: Log in to view member products.
                    antlers: false
                    if:
                      audience: equals members
      
                - handle: c7_notice
                  field:
                    type: html
                    display: This is a Commerce7 block:
                    antlers: false
                    html: |
                      <div class="help-block">
                      <p>Products shown are pulled automatically from the Commerce7 product collection specified by the title.</p>
                      <p>Manage products and promotions: <a href="https://admin.commerce7.com/" target="_blank" rel="noopener">Open Commerce7</a></p>
                      </div>

            wine_club_signup:
              display: Wine Club Signup
              instructions: 'Shows the same Mixed and Reds Only club options configured for the Club page.'
              icon: mail-inbox-content
              fields:
                - handle: heading
                  field:
                    type: text
                    display: Heading
                    instructions: 'Optional. Short headline shown above the club options.'
                    antlers: false

                - handle: intro
                  field:
                    type: textarea
                    display: Description
                    instructions: 'Optional. Supporting copy shown below the headline.'
                    antlers: false
                    rows: 3

                - handle: c7_notice
                  field:
                    type: html
                    display: 'Club content'
                    antlers: false
                    html: |
                      <div class="help-block">
                      <p>Club names, descriptions, fulfillment details, and Commerce7 signup options are inherited from the Club page.</p>
                      </div>

            events_listing:
              display: Events Listing
              instructions: 'Lists upcoming entries from the Events collection.'
              icon: calendar
              fields:
                -
                  handle: heading
                  field:
                    type: text
                    display: Heading
                -
                  handle: intro
                  field:
                    type: textarea
                    display: Intro
                -
                  handle: limit
                  field:
                    type: integer
                    display: Number of events
                    default: 6
                    validate:
                      - min: 1
                      - max: 24
                -
                  handle: show_past
                  field:
                    type: toggle
                    display: Include past events
                    default: false

            promo_cards:
              display: Promo Area
              instructions: 'Promotional cards: recipes, events, wines.'
              icon: dashboard-layout-2
              fields:
                - handle: cards
                  field:
                    type: grid
                    antlers: true 
                    display: Cards
                    instructions: 'Add up to 9 promo cards. Drag to reorder.'
                    mode: stacked
                    reorderable: true
                    min_rows: 1
                    max_rows: 9

                    fields:

                      - handle: enabled
                        field:
                          type: toggle
                          display: Enabled
                          instructions: 'Show this card on the live site. Turn off to prepare a card without publishing it.'
                          default: true
                          width: 33

                      - handle: members_only
                        field:
                          type: toggle
                          display: Members Only
                          instructions: 'Only show this card to visitors who are logged in to a Commerce7 account.'
                          default: false
                          width: 33

                      - handle: heading
                        field:
                          type: text
                          display: Card Title
                          instructions: 'Headline / promo name.'
                          validate:
                            - required
                          width: 50

                      - handle: subtitle
                        field:
                          type: text
                          display: Subtitle
                          instructions: 'Optional short subheading.'
                          width: 50

                      - handle: body
                        field:
                          type: textarea
                          display: Body Text
                          instructions: 'Optional short paragraph/description for this promo.'
                          rows: 3

                      - handle: link_type
                        field:
                          type: select
                          display: Link Type
                          instructions: 'Choose how (or if) this card links.'
                          options:
                            none: No link
                            internal: Internal Entry
                            external: External URL
                          default: none
                          width: 33

                      - handle: link_entry
                        field:
                          type: entries
                          display: Internal Link (Entry)
                          instructions: 'Pick an internal page/entry to link to.'
                          max_items: 1
                          validate:
                            - 'required_if:{this}.link_type,internal'
                          if:
                            link_type: equals internal
                          width: 33

                      - handle: link_url
                        field:
                          type: text
                          display: External Link (URL)
                          instructions: 'Full external URL (Tock, booking, etc).'
                          input_type: url
                          validate:
                            - 'required_if:{this}.link_type,external'
                          if:
                            link_type: equals external
                          width: 33

                      - handle: bg_type
                        field:
                          type: select
                          display: Card Visual Type
                          instructions: 'Choose whether this card uses an uploaded image or a solid color.'
                          options:
                            image: Image
                            color: Color
                          default: image
                          width: 33

                      - handle: bg_image
                        field:
                          type: assets
                          display: Card Image
                          instructions: 'Upload/select an image shown inside the card. You can set its focal point.'
                          max_files: 1
                          container: promo_images
                          allow_uploads: true
                          if:
                            bg_type: equals image
                          width: 66

                      - handle: bg_color
                        field:
                          type: color
                          display: Card Color
                          instructions: 'Solid card color used when Card Visual Type is set to Color.'
                          swatches:
                            - '#000000'
                            - '#ffffff'
                            - '#cccccc'
                          if:
                            bg_type: equals color
                          width: 33

            links_block:
              display: Links Block
              instructions: 'Manually curated link cards for events, recipes, and more.'
              icon: dashboard-layout
              fields:
                - handle: cards
                  field:
                    type: grid
                    display: Cards
                    instructions: 'Add link cards. Drag to reorder.'
                    mode: stacked
                    reorderable: true
                    min_rows: 1

                    fields:

                      - handle: title
                        field:
                          type: text
                          display: Title
                          instructions: 'Card headline.'
                          validate:
                            - required
                          width: 50

                      - handle: subtitle
                        field:
                          type: text
                          display: Subtitle
                          instructions: 'Optional short label shown above the title.'
                          width: 50

                      - handle: description
                        field:
                          type: textarea
                          display: Description
                          instructions: 'Optional short description shown on hover.'
                          rows: 3

                      - handle: image
                        field:
                          type: assets
                          display: Image
                          instructions: 'Upload or select a card image.'
                          container: assets
                          max_files: 1
                          allow_uploads: true
                          width: 66

                      - handle: fallback_color
                        field:
                          type: color
                          display: Fallback Color
                          instructions: 'Background color shown when no image is uploaded.'
                          swatches:
                            - '#e1d6c4'
                            - '#8f896a'
                            - '#986b54'
                            - '#b3a28a'
                            - '#bbc0aa'
                            - '#1b1a21'
                          width: 33

                      - handle: link_type
                        field:
                          type: select
                          display: Link Type
                          instructions: 'Choose how (or if) this card links.'
                          options:
                            none: No link
                            internal: Internal Page
                            external: External URL
                          default: none
                          clearable: false
                          multiple: false
                          searchable: false
                          width: 33

                      - handle: link_entry
                        field:
                          type: entries
                          display: Internal Link
                          instructions: 'Pick an internal page or entry to link to.'
                          max_items: 1
                          if:
                            link_type: equals internal
                          width: 33

                      - handle: link_url
                        field:
                          type: text
                          display: External URL
                          instructions: 'Full external URL including https://'
                          input_type: url
                          if:
                            link_type: equals external
                          width: 33

            recipes_listing:
              display: 'Recipes Listing'
              icon: layout-carousel-horizontal
              fields:
                -
                  import: recipes_listing

            recipe:
              display: Recipe
              icon: food-menu-book
              fields:
                -
                  handle: title
                  field:
                    type: text
                    display: Title
                    validate:
                      - required

                -
                  handle: description
                  field:
                    type: textarea
                    display: Description
                    rows: 3

                -
                  handle: servings
                  field:
                    type: text
                    display: Servings
                    width: 33
                    instructions: e.g. 4–6

                -
                  handle: prep_time
                  field:
                    type: text
                    display: Prep Time
                    width: 33
                    instructions: e.g. 15 min

                -
                  handle: cook_time
                  field:
                    type: text
                    display: Cook Time
                    width: 33
                    instructions: e.g. 25 min

                -
                  handle: image
                  import: picture

                -
                  handle: ingredients
                  field:
                    type: markdown
                    display: Ingredients

                -
                  handle: instructions
                  field:
                    type: markdown
                    display: Instructions

                -
                  handle: notes
                  field:
                    type: markdown
                    display: Notes      

            menu:
              display: Menu
              instructions: 'Build a responsive wine and food tasting menu. The website controls the design; editors control the menu copy and item order.'
              icon: dashboard-layout
              fields:
                - handle: title
                  field:
                    type: text
                    display: Menu title
                    instructions: 'Main heading shown above the tasting menu.'
                    width: 50
                    validate: [required]

                - handle: subtitle
                  field:
                    type: text
                    display: Menu subtitle
                    instructions: 'Optional short label, such as “Tasting Experience”.'
                    width: 50

                - handle: statement
                  field:
                    type: textarea
                    display: Introduction
                    instructions: 'Optional introductory statement shown below the menu title.'
                    rows: 3
                    antlers: false

                - handle: pairings
                  field:
                    type: grid
                    display: Tasting menu items
                    instructions: 'Add one row per wine and food pairing. Drag rows to change their order; turn a row off to keep it as a draft.'
                    add_row: Add menu item
                    mode: stacked
                    reorderable: true
                    fullscreen: true
                    min_rows: 1
                    fields:
                      - handle: enabled
                        field:
                          type: toggle
                          display: Show this item
                          instructions: 'Turn off to keep this item in Statamic without showing it on the website.'
                          default: true
                          width: 25

                      - handle: special_item
                        field:
                          type: toggle
                          display: Special menu item
                          instructions: 'Show this as an unnumbered featured item, such as the Lunch / Member Only offering.'
                          default: false
                          width: 25

                      - handle: wine
                        field:
                          type: text
                          display: Wine
                          instructions: 'Vintage and wine name, such as “2020 Chardonnay”.'
                          width: 50
                          validate: [required]

                      - handle: special_label
                        field:
                          type: text
                          display: Special item label
                          instructions: 'For example: “Lunch // Member Only”.'
                          width: 50
                          if:
                            special_item: equals true

                      - handle: description
                        field:
                          type: markdown
                          display: Wine Description
                          instructions: 'Optional. Use a blank line between paragraphs. The website controls paragraph spacing and indentation.'
                          buttons: []
                          automatic_line_breaks: false
                          escape_markup: true
                          fullscreen: true
                          antlers: false

                      - handle: food
                        field:
                          type: text
                          display: Pairing Item
                          instructions: 'The featured food pairing shown in teal.'
                          validate: [required]

                      - handle: food_details
                        field:
                          type: textarea
                          display: Pairing details
                          instructions: 'Optional ingredients or supporting description.'
                          rows: 3
                          antlers: false

            article:
              display: Article
              instructions: 'Long form content, can be expanded with picture, video, quotes or tables.'
              icon: text-formatting-image-bottom
              fields:
                -
                  import: article

            blog_excerpt:
              display: 'Blog Excerpt'
              icon: layout-three-columns
              fields:
                -
                  import: blog_excerpt

            blog_paginated:
              display: 'Blog Paginated'
              icon: layout-grid-dots
              fields:
                -
                  import: blog_paginated

            contact:
              display: Contact
              icon: phone-contact-phonebook
              fields:
                -
                  import: contact

            faqs:
              display: FAQs
              icon: alert-help-question
              fields:
                -
                  import: faqs

            #hero_home:
              #display: 'Hero'
              #icon: align-object-top
              #fields:
                #-
                  #import: hero_home

            newsletter:
              display: Newsletter
              icon: social-mail-send-email-message
              fields:
                -
                  import: newsletter

            search_form:
              display: 'Search form'
              icon: search-magnifying-glass
              fields:
                -
                  import: search_form

            search_results:
              display: 'Search Results'
              icon: text-formatting-image-bottom
              fields:
                -
                  import: search_results

            style_guide:
              display: 'Style Guide'
              instructions: 'Styles and components in one place.'
              icon: edit-paint-palette
              fields:
                -
                  import: style_guide

            team:
              display: Team
              icon: user-multiple
              fields:
                -
                  import: team

            testimonials:
              display: Testimonials
              icon: text-formatting-quotation
              fields:
                -
                  import: testimonials

            tock:
              display: Tock
              instructions: 'Displays tasting experiences managed in Tock.'
              icon: calendar
              fields:
                -
                  import: tock

            embed:
              display: Embed
              icon: code
              fields:
                -
                  import: embed

            
